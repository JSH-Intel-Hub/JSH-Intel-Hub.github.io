<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Queue Dashboard</title>
<style>
:root{
--bg:#0f172a;--panel:#1e293b;--border:rgba(148,163,184,.18);
--text:#e2e8f0;--muted:#94a3b8;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);
font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
height:100vh;overflow:hidden}
.dashboard{height:100vh;padding:24px;display:flex;flex-direction:column}
.header h1{margin:0;font-size:42px}
.header p{margin:8px 0 18px;color:var(--muted)}
.main-grid{flex:1;display:grid;grid-template-columns:45% 55%;gap:18px;min-height:0}
.sidebar-queue,.master-viewport{
background:rgba(30,41,59,.82);border:1px solid var(--border);
border-radius:18px;overflow:hidden}
.sidebar-queue{overflow-y:auto;padding:18px}
.section-title{font-size:13px;letter-spacing:.08em;text-transform:uppercase}
.report-row{background:rgba(51,65,85,.45);border:1px solid var(--border);
padding:14px;border-radius:14px;margin-bottom:10px}
.row-top{display:flex;gap:10px;align-items:center}
.report-link{color:var(--text);text-decoration:none;font-weight:700}
.takeaways{margin:8px 0 0 24px;color:var(--muted);font-size:13px}
.master-viewport{display:flex;flex-direction:column}
.viewport-toolbar{padding:12px 16px;border-bottom:1px solid var(--border);
color:var(--muted);font-size:12px;letter-spacing:.08em}
iframe{border:0;width:100%;height:100%}
</style>
</head>
<body>
<div class="dashboard">
<header class="header">
<h1>Research Queue</h1>
<p>Personal investment memo tracker and institutional research archive.</p>
</header>

<main class="main-grid">
<aside class="sidebar-queue">
<h2 class="section-title">Aerospace & Defense</h2>

<div class="report-row">
<div class="row-top">
<input type="checkbox" class="review-checkbox" data-id="bofa-defense">
<a class="report-link" href="aerospace-defense/BofA_Defense_Primer_Summary.html" target="viewer_window">
BofA Defense Primer Summary
</a>
</div>
<ul class="takeaways">
<li>Defense modernization and budget durability.</li>
<li>Mission critical platforms and suppliers.</li>
<li>Useful sector primer and diligence reference.</li>
</ul>
</div>
</aside>

<section class="master-viewport">
<div class="viewport-toolbar">MASTER VIEWPORT</div>
<iframe name="viewer_window" srcdoc="<html><body style='margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#94a3b8;font-family:sans-serif'><h2>Select a report from the queue to begin reading.</h2></body></html>"></iframe>
</section>
</main>
</div>

<script>
document.querySelectorAll('.review-checkbox').forEach(cb=>{
const key='reviewed-'+cb.dataset.id;
cb.checked=localStorage.getItem(key)==='true';
cb.addEventListener('change',()=>localStorage.setItem(key,cb.checked));
});
</script>
</body>
</html>
